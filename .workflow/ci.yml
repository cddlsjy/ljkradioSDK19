# 文件名: .gitee-ci.yml

name: Android CI Build

# 配置触发事件
# 当代码push到任何分支时，或者手动触发时，都会运行此任务
on:
  push:
    branches:
      - '**' # 监听所有分支的push事件
  workflow_dispatch: # 允许在Gitee CI界面手动触发此工作流

# 任务列表
jobs:
  build:
    # 任务运行环境
    # Gitee CI通常提供基于Linux的Runner。
    # `ubuntu-latest` 是一个常见的标签，如果Gitee CI不支持，可能需要查看Gitee文档指定其可用的Linux镜像。
    runs-on: ubuntu-latest # 假设Gitee CI兼容GitHub Actions的`ubuntu-latest`标签

    # 任务步骤列表
    steps:
      # 1. 检出代码 (Checkout code)
      # Gitee CI通常会自动将仓库代码克隆到工作目录。
      # `uses: actions/checkout@v4` 是GitHub Action，如果Gitee CI有兼容层，则会工作。
      # 否则，这一步可能不是严格必须的，或者需要替换为Gitee CI原生代码检出方式。
      - name: Checkout code
        uses: actions/checkout@v4 

      # 2. 设置Java开发环境 (Set up JDK)
      # Android项目构建需要Java开发工具包 (JDK)。这里指定使用Java 17。
      # `uses: actions/setup-java@v4` 同样是GitHub Action。
      # `cache: 'gradle'` 会缓存Gradle依赖，加速后续构建。
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # 使用Eclipse Adoptium (前OpenJDK) 的Temurin发行版
          cache: 'gradle' 

      # 3. 授予Gradle Wrapper执行权限 (Make gradlew executable)
      # 在Linux环境中，`gradlew` (Gradle Wrapper脚本) 需要执行权限才能运行。
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 4. 执行Gradle构建 (Build APK)
      # 这是核心步骤，它替换了你之前错误的`mvn`命令。
      # `./gradlew assembleDebug` 会使用项目目录中的`gradlew`脚本来构建Android应用的调试（Debug）版本。
      # `--stacktrace` 会在构建失败时提供更详细的错误堆栈信息。
      # `--no-daemon` 确保每次构建都在一个新进程中进行，避免CI环境的潜在冲突。
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      # 5. (可选) 寻找并列出APK文件 (Find and List APK files)
      # 这一步不是严格必须的，但可以在构建日志中显示生成的APK文件路径，方便确认。
      - name: Find and List APK files
        run: find app/build/outputs -name "*.apk" -type f

    # 6. 定义构建产物 (Artifacts)
    # `artifacts` 关键字用于指定在任务完成后需要从CI环境中保存哪些文件。
    # 这里将`app/build/outputs/apk/`目录下所有生成的`.apk`文件作为构建产物上传。
    artifacts:
      - path: app/build/outputs/apk/**/*.apk # 匹配`app/build/outputs/apk/`及其所有子目录下的所有.apk文件
        name: app-debug-apk # 定义产物的名称
        retention-days: 7 # 产物保留天数 (可选，可以根据需要调整)