name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK as artifact (可选，保留在 GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: 查找并打印 APK 路径（调试用）
        run: find . -name "*.apk" -type f

      - name: Create Gitee Release and Upload APK
        uses: nogsantos/gitee-release-cli-action@v1   # 注意：请确认 action 名称是否正确
        with:
          token: ${{ secrets.GITEE_TOKEN }}
          repo: cddlsjy/ljkradiosdk19
          tag_name: v1.0.${{ github.run_number }}
          release_name: "APK Release ${{ github.run_number }}"
          body: "自动编译产物"
          files: app/build/outputs/apk/debug/app-debug.apk