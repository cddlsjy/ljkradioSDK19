name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
- name: 查找并上传 APK 文件
  run: |
    # 在项目目录中搜索所有 .apk 文件，并打印出它们的完整路径
    find . -name "*.apk" -type f



    - name: Create Gitee Release and Upload APK
  uses: nogsantos/gitee-debug-cli-action@v1
  with:
    token: ${{ secrets.GITEE_TOKEN }}
    repo:    cddlsjy/ljkradiosdk19      #你的Gitee用户名/仓库名
    tag_name: v1.0.${{ github.run_number }}
    release_name: "APK Release ${{ github.run_number }}"
    body: "自动编译产物"
  files: app/build/outputs/apk/debug/app-debug.apk   # 替换为你的APK路径
    

