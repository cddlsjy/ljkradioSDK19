# Gitee CI 配置 - 针对 Android Gradle 项目修正版
version: '1.0'

# 使用 Gitee Go 官方提供的 Android 构建镜像（已内置 JDK 17 和 Android SDK）
image: registry.cn.hangzhou.aliyuncs.com/gitee-go/android:latest

# 定义流水线阶段
stages:
  - build

# 构建任务
build-apk:
  stage: build
  # 触发条件：任意分支推送或手动触发
  only:
    - branches
    - web
  script:
    # 1. 输出环境信息便于调试
    - echo "JAVA_HOME: $JAVA_HOME"
    - java -version
    # 2. 赋予 gradlew 执行权限
    - chmod +x ./gradlew
    # 3. 执行 Gradle 构建（关键修复：使用 gradlew 代替 mvn）
    - ./gradlew assembleDebug --stacktrace --no-daemon
  after_script:
    # 打印产物路径，方便检查
    - echo "Build finished. Check app/build/outputs/apk/debug/"
  artifacts:
    # 指定要保留的 APK 文件路径
    paths:
      - app/build/outputs/apk/debug/*.apk
    # 保留 7 天
    expire_in: 7 days